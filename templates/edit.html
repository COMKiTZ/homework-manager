{% extends "base.html" %}



{% block head %}
<title>Edit Task</title>
{% endblock head %}



{% block body %}
<div class="content">
    <h1>Edit Task</h1>
    <form action="/edit/{{task.id}}" method="POST">
        <input type="text" name="content" id="content" placeholder="Edit task..." value="{{ task.content }}">
        <input type="date" name="due_date" id="due_date" value="{{ task.due_date }}">
        <input type="submit" value="Update" id="update-btn">
    </form>
</div>
{% endblock body %}
